<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Background with deep dark indigo for beautiful contrast -->
  <rect width="512" height="512" rx="112" fill="#4F46E5"/>
  
  <!-- Outer glowing rings representing spinning discs -->
  <circle cx="256" cy="256" r="190" fill="none" stroke="#FFFFFF" stroke-width="16" stroke-dasharray="120 70 200 60" opacity="0.3" stroke-linecap="round"/>
  
  <!-- Main outer spinning lane -->
  <circle cx="256" cy="256" r="150" fill="none" stroke="#818CF8" stroke-width="24" stroke-dasharray="240 120" stroke-linecap="round"/>
  
  <!-- Dynamic middle neon green lane -->
  <circle cx="256" cy="256" r="100" fill="none" stroke="#10B981" stroke-width="18" stroke-dasharray="140 80" stroke-linecap="round" opacity="0.9"/>
  
  <!-- Inner orange lane -->
  <circle cx="256" cy="256" r="60" fill="none" stroke="#F59E0B" stroke-width="14" stroke-dasharray="90 50" stroke-linecap="round" opacity="0.85"/>
  
  <!-- Center hub details and spin dial indicator -->
  <polygon points="256,66 276,120 236,120" fill="#EF4444"/>
  <circle cx="256" cy="256" r="28" fill="#FFFFFF" filter="drop-shadow(0px 4px 6px rgba(0,0,0,0.15))"/>
  <circle cx="256" cy="256" r="12" fill="#4F46E5"/>
</svg>
